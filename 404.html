<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Styli</title>
<script>
  // GitHub Pages SPA fallback — redirects /any/path to /?_redirect=/any/path
  // index.html reads _redirect on load and pushes it to history
  var path = window.location.pathname + window.location.search + window.location.hash;
  var base = window.location.protocol + '//' + window.location.host;
  // Detect repo path on github.io (e.g. /styli-platform)
  var pathParts = window.location.pathname.split('/');
  var repoName = (window.location.host.includes('github.io') && pathParts.length > 1) ? '/' + pathParts[1] : '';
  window.location.replace(base + repoName + '/?_redirect=' + encodeURIComponent(path.replace(repoName, '') || '/'));
</script>
</head>
<body></body>
</html>
