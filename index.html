<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Styli — Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5F0E8; --cream-light: #FAF6EF; --bg: #FBF8F3;
  --panel: #FFFFFF; --ink: #1A1612; --ink-soft: #3A342C; --ink-mid: #5A5249;
  --muted: #8A817A; --line: #E8E0D2; --line-soft: #F0E9DC;
  --rose: #C97B63; --rose-deep: #A85A42; --rose-light: #F3DDD2; --rose-faint: #FBF0EA;
  --sage: #7A8871; --sage-light: #E3E9DF;
  --gold: #B8935E; --gold-light: #F0E3CC;
  --alert: #C8553D; --alert-light: #F9E4DE;
  --ok: #5A7A52; --ok-light: #E0EAD9;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: 'Inter Tight', sans-serif;
  background: var(--bg); color: var(--ink);
  font-size: 14px; line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
.serif { font-family: 'Fraunces', serif; letter-spacing: -0.01em; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* ======== GLOBAL TOP BAR ======== */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--panel); border-bottom: 1px solid var(--line);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
}
.topbar-brand { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; letter-spacing: -0.04em; cursor: pointer; }
.topbar-brand .dot { color: var(--rose); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-tag {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); padding: 3px 8px; border: 1px solid var(--line); border-radius: 100px;
}
.user-chip {
  display: flex; align-items: center; gap: 10px; padding: 6px 10px 6px 6px;
  background: var(--cream); border-radius: 100px; cursor: pointer; font-size: 13px;
}
.user-chip:hover { background: var(--cream-light); }
.user-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--rose-deep));
  color: white; font-weight: 600; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}
.user-avatar.admin { background: linear-gradient(135deg, var(--ink), #3A342C); }

/* ======== BUTTONS ======== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: 100px; font-size: 13px; font-weight: 500;
  border: none; cursor: pointer; transition: all 0.15s; font-family: inherit;
  letter-spacing: 0.01em;
}
.btn-primary { background: var(--ink); color: var(--cream-light); }
.btn-primary:hover { background: var(--rose-deep); }
.btn-primary:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.6; }
.btn-secondary { background: var(--panel); color: var(--ink-soft); border: 1px solid var(--line); }
.btn-secondary:hover { border-color: var(--ink-soft); }
.btn-ghost { background: transparent; color: var(--ink-soft); }
.btn-ghost:hover { background: var(--cream); }
.btn-danger { background: var(--alert-light); color: var(--alert); }
.btn-danger:hover { background: var(--alert); color: white; }
.btn-small { padding: 6px 12px; font-size: 12px; border-radius: 100px; }
.btn-square { border-radius: 10px; }

/* ======== LANDING ======== */
.landing {
  min-height: 100vh;
  background:
    radial-gradient(circle at 15% 10%, rgba(232, 196, 181, 0.4) 0%, transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(184, 147, 94, 0.2) 0%, transparent 50%),
    var(--bg);
  padding: 60px 24px 80px;
}
.landing-wrap { max-width: 980px; margin: 0 auto; }
.landing-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 64px; }
.landing-brand { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; letter-spacing: -0.04em; }
.landing-brand .dot { color: var(--rose); }
.landing-eyebrow {
  font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--rose-deep); font-weight: 500; margin-bottom: 24px;
}
.landing-h1 {
  font-family: 'Fraunces', serif; font-size: 76px; line-height: 0.95;
  letter-spacing: -0.03em; font-weight: 400; margin-bottom: 28px;
  max-width: 760px;
}
.landing-h1 em { font-style: italic; color: var(--rose-deep); font-weight: 500; }
.landing-lead {
  font-size: 19px; color: var(--ink-soft); max-width: 580px;
  line-height: 1.5; margin-bottom: 48px;
}
.landing-choose {
  font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 18px; font-weight: 500;
}
.landing-cards {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
  margin-bottom: 64px;
}
@media (max-width: 780px) {
  .landing-cards { grid-template-columns: 1fr; }
  .landing-h1 { font-size: 52px; }
}
.landing-card {
  background: var(--panel); border: 1px solid var(--line); border-radius: 20px;
  padding: 28px 24px; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; gap: 12px;
  text-align: left;
}
.landing-card:hover { transform: translateY(-3px); border-color: var(--rose); box-shadow: 0 16px 40px rgba(26, 22, 18, 0.08); }
.landing-card-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500;
  margin-bottom: 8px;
}
.landing-card.buyer .landing-card-icon { background: var(--rose-faint); color: var(--rose-deep); }
.landing-card.vendor .landing-card-icon { background: var(--sage-light); color: var(--sage); }
.landing-card.admin .landing-card-icon { background: var(--cream); color: var(--ink); }
.landing-card-tag { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.landing-card-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }
.landing-card-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; flex: 1; }
.landing-card-action { font-size: 13px; color: var(--rose-deep); font-weight: 500; margin-top: 8px; }
.landing-foot-note {
  padding: 18px 24px; background: var(--rose-faint); border-radius: 12px;
  font-size: 13px; color: var(--ink-soft); border-left: 3px solid var(--rose);
}

/* ======== AUTH PAGES ======== */
.auth-wrap {
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(232, 196, 181, 0.3) 0%, transparent 40%),
    var(--bg);
  display: flex; align-items: center; justify-content: center; padding: 40px 24px;
}
.auth-card {
  max-width: 440px; width: 100%; background: var(--panel);
  border: 1px solid var(--line); border-radius: 24px; padding: 40px 36px;
  box-shadow: 0 20px 60px rgba(26, 22, 18, 0.06);
}
.auth-brand { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 500; letter-spacing: -0.04em; margin-bottom: 28px; }
.auth-brand .dot { color: var(--rose); }
.auth-title { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 10px; }
.auth-title em { font-style: italic; color: var(--rose-deep); }
.auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
.auth-field { margin-bottom: 14px; }
.auth-label { display: block; font-size: 12px; color: var(--ink-mid); margin-bottom: 6px; font-weight: 500; }
.auth-input {
  width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px;
  font-family: inherit; font-size: 14px; background: var(--panel); outline: none;
  transition: border 0.15s;
}
.auth-input:focus { border-color: var(--rose); }
.auth-btn { width: 100%; padding: 14px; margin-top: 8px; }
.auth-footer { margin-top: 20px; font-size: 13px; color: var(--muted); text-align: center; }
.auth-footer a { color: var(--rose-deep); text-decoration: none; font-weight: 500; cursor: pointer; }
.auth-back { font-size: 12px; color: var(--muted); cursor: pointer; margin-bottom: 20px; display: inline-block; }
.auth-back:hover { color: var(--ink); }

/* ======== BUYER WEB ======== */
.buyer-page {
  max-width: 1280px; margin: 0 auto; padding: 32px 40px 80px;
}
/* Buyer console: sidebar + main content layout */
.buyer-console { display: flex; min-height: calc(100vh - 40px); background: var(--bg); }
.buyer-console .console-sidebar { background: var(--panel); }
.buyer-console .console-main { padding: 0; }
.buyer-console .buyer-page { padding: 28px 36px 80px; max-width: none; }
.buyer-console .buyer-hero { padding: 24px 0 40px; margin-bottom: 32px; }
.buyer-console .buyer-hero-headline { font-size: 44px; }

/* Wishlist heart button overlaid on product cards */
.wish-btn {
  position: absolute; top: 10px; right: 10px; z-index: 2;
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: rgba(255, 255, 255, 0.92); color: var(--muted);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s, color 0.15s;
  font-family: inherit;
}
.wish-btn:hover { transform: scale(1.08); background: #fff; color: var(--rose-deep); }
.wish-btn.active { background: var(--rose-faint); color: var(--rose-deep); }
.wish-btn.active::before { content: '♥'; }
.wish-btn:not(.active)::before { content: '♡'; }

/* Wishlist page empty state */
.wish-empty {
  padding: 60px 20px; text-align: center; color: var(--muted);
  background: var(--panel); border: 1px dashed var(--line); border-radius: 16px;
}
.wish-empty .wish-empty-icon { font-size: 40px; color: var(--rose); margin-bottom: 12px; }
.wish-empty h3 { font-family: 'Fraunces', serif; font-size: 24px; color: var(--ink); margin-bottom: 6px; font-weight: 500; }

/* Buyer profile page */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 760px; }
.profile-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 20px 22px; }
.profile-card h3 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin-bottom: 14px; }
.profile-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line-soft); font-size: 13.5px; }
.profile-row:last-child { border-bottom: none; }
.profile-row .k { color: var(--muted); }
.profile-row .v { color: var(--ink); font-weight: 500; }
@media (max-width: 700px) {
  .profile-grid { grid-template-columns: 1fr; }
  .buyer-console .console-sidebar { width: 200px; }
}
.buyer-hero {
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px;
  padding: 48px 0 56px; border-bottom: 1px solid var(--line-soft); margin-bottom: 48px;
}
.buyer-hero-headline {
  font-family: 'Fraunces', serif; font-size: 56px; line-height: 0.98;
  letter-spacing: -0.03em; font-weight: 400; margin-bottom: 24px;
}
.buyer-hero-headline em { font-style: italic; color: var(--rose-deep); font-weight: 500; }
.buyer-hero-sub { font-size: 16px; color: var(--ink-soft); max-width: 440px; margin-bottom: 28px; line-height: 1.5; }
.buyer-hero-visual {
  aspect-ratio: 4/5; border-radius: 20px;
  background: linear-gradient(135deg, #E8C4B5, #C97B63);
  position: relative; overflow: hidden;
}
.buyer-hero-visual::after {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/></svg>");
  mix-blend-mode: overlay;
}

/* ======== PRODUCT GRID ======== */
.section-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 28px;
}
.section-title { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; }
.section-title em { font-style: italic; color: var(--rose-deep); font-weight: 500; }
.section-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
.filters {
  display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center;
}
.filter-chip {
  padding: 8px 14px; background: var(--panel); border: 1px solid var(--line);
  border-radius: 100px; font-size: 12px; color: var(--ink-soft); cursor: pointer;
  font-family: inherit;
}
.filter-chip:hover { border-color: var(--ink-soft); }
.filter-chip.active { background: var(--ink); color: var(--cream-light); border-color: var(--ink); }
.products-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px;
}
.product-card {
  cursor: pointer; transition: transform 0.2s;
  background: transparent; border: none; padding: 0; text-align: left; font-family: inherit; color: inherit;
}
.product-card:hover { transform: translateY(-2px); }
.product-image {
  width: 100%; aspect-ratio: 3/4; border-radius: 14px; margin-bottom: 10px;
  position: relative; overflow: hidden;
}
.product-image::after {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.12'/></svg>");
  mix-blend-mode: overlay;
}
.match-badge {
  position: absolute; top: 10px; left: 10px;
  background: rgba(250, 246, 239, 0.95); backdrop-filter: blur(8px);
  padding: 5px 10px; border-radius: 100px; font-size: 11px; font-weight: 500;
  color: var(--rose-deep); z-index: 2; display: flex; align-items: center; gap: 4px;
}
.match-badge::before { content: ''; width: 6px; height: 6px; background: var(--rose-deep); border-radius: 50%; }
.product-brand { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 3px; }
.product-name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500; color: var(--ink); line-height: 1.2; margin-bottom: 4px; }
.product-price { font-size: 13px; color: var(--ink-soft); font-weight: 500; }

/* ======== PRODUCT DETAIL ======== */
.product-detail {
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
  max-width: 1200px; margin: 0 auto; padding: 32px 40px 80px;
}
.detail-image-large {
  aspect-ratio: 4/5; border-radius: 20px; position: relative; overflow: hidden;
}
.detail-image-large::after {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/></svg>");
  mix-blend-mode: overlay;
}
.detail-brand { font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 10px; }
.detail-name { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 16px; }
.detail-price { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 500; margin-bottom: 28px; }
.detail-desc { font-size: 14px; color: var(--ink-soft); margin-bottom: 24px; line-height: 1.5; }
.why-section {
  background: var(--rose-faint); border-radius: 16px; padding: 20px 24px; margin-bottom: 28px;
}
.why-label {
  font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--rose-deep); margin-bottom: 12px; font-weight: 500;
}
.why-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
.why-item:last-child { margin-bottom: 0; }
.why-bullet {
  width: 18px; height: 18px; border-radius: 50%; background: var(--rose-deep);
  color: var(--cream-light); font-size: 10px; display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; margin-top: 2px; font-weight: 600;
}
.why-text { font-size: 14px; line-height: 1.45; color: var(--ink); }
.size-section { margin-bottom: 28px; }
.size-label { font-size: 13px; color: var(--ink-soft); margin-bottom: 10px; font-weight: 500; }
.size-row { display: flex; gap: 8px; flex-wrap: wrap; }
.size-box {
  min-width: 56px; padding: 12px 14px; border: 1px solid var(--line);
  border-radius: 10px; text-align: center; font-size: 13px; cursor: pointer;
  transition: all 0.15s; background: transparent; color: var(--ink-soft); font-family: inherit;
}
.size-box.selected { background: var(--ink); color: var(--cream-light); border-color: var(--ink); }
.size-box.out { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }

/* ======== SELLER CONSOLE ======== */
.console { display: flex; min-height: 100vh; }
.console-sidebar {
  width: 240px; background: var(--panel); border-right: 1px solid var(--line);
  padding: 24px 0; display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh; flex-shrink: 0;
}
.console-brand { padding: 0 24px 24px; border-bottom: 1px solid var(--line-soft); margin-bottom: 16px; }
.console-brand-mark { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; letter-spacing: -0.04em; }
.console-brand-mark .dot { color: var(--rose); }
.console-brand-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 4px; }
.nav-section { padding: 0 12px; margin-bottom: 12px; }
.nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); padding: 8px 12px 6px; font-weight: 500; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  border-radius: 8px; font-size: 13.5px; color: var(--ink-soft);
  cursor: pointer; margin-bottom: 2px; transition: all 0.15s;
}
.nav-item:hover { background: var(--cream); color: var(--ink); }
.nav-item.active { background: var(--ink); color: var(--cream-light); font-weight: 500; }
.nav-icon { width: 16px; display: inline-flex; justify-content: center; font-size: 13px; opacity: 0.7; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-badge { margin-left: auto; background: var(--rose); color: white; font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 600; min-width: 18px; text-align: center; }
.nav-item.active .nav-badge { background: var(--rose-light); color: var(--rose-deep); }
.console-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--line-soft); }
.console-main { flex: 1; padding: 28px 36px 80px; min-width: 0; overflow-x: hidden; }

/* ======== SHARED PAGE ELEMENTS ======== */
.page-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--line-soft);
}
.page-title { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 500; letter-spacing: -0.02em; line-height: 1.1; }
.page-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
.page-actions { display: flex; gap: 10px; }

.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; }
.kpi-card.accent { background: linear-gradient(135deg, var(--rose-faint), var(--panel)); }
.kpi-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.kpi-value { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
.kpi-delta { font-size: 12px; margin-top: 6px; }
.kpi-delta.up { color: var(--ok); }
.kpi-delta.down { color: var(--alert); }

.panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; }
.panel-header { padding: 16px 22px; border-bottom: 1px solid var(--line-soft); display: flex; justify-content: space-between; align-items: center; }
.panel-title { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; }
.panel-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.table { width: 100%; border-collapse: collapse; }
.table thead th {
  text-align: left; padding: 11px 22px; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);
  font-weight: 500; border-bottom: 1px solid var(--line-soft); background: var(--cream-light);
}
.table tbody td { padding: 13px 22px; border-bottom: 1px solid var(--line-soft); font-size: 13px; vertical-align: middle; }
.table tbody tr:last-child td { border-bottom: none; }
.table tbody tr:hover { background: var(--cream-light); }
.cell-primary { font-weight: 500; color: var(--ink); }
.cell-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  returns: [
    { id: 'RT-2204', orderId: 'SY-8802', vendorId: 'v-kavya', productId: 'p-004', size: 'M', price: 1850, buyer: 'Sneha R.', reason: 'Size too small', note: 'Tight around shoulders', respondHrs: 18, status: 'pending' },
  ],
  buyers: [],
  currentUser: null,
  buyerCart: [],
  buyerProfile: null,
  buyerOrders: [],
  buyerWishlist: [],
});

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    // Merge with defaults for new fields
    return { ...defaultState(), ...parsed };
  } catch { return defaultState(); }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

// ============ STATE CONTEXT ============
const AppContext = createContext();
const useApp = () => useContext(AppContext);

function AppProvider({ children }) {
  const [state, setState] = useState(loadState());
  const [toasts, setToasts] = useState([]);

  useEffect(() => { saveState(state); }, [state]);

  const addToast = useCallback((message, type='info', icon='✓') => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, message, type, icon }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  // Patching helpers — these modify state immutably
  const actions = useMemo(() => ({
    setCurrentUser: (u) => setState(s => ({ ...s, currentUser: u })),
    logout: () => setState(s => ({ ...s, currentUser: null, buyerCart: [], buyerWishlist: [] })),

    // Buyer wishlist
    toggleWishlist: (productId) => setState(s => {
      const list = s.buyerWishlist || [];
      const exists = list.includes(productId);
      return { ...s, buyerWishlist: exists ? list.filter(x => x !== productId) : [...list, productId] };
    }),
    clearWishlist: () => setState(s => ({ ...s, buyerWishlist: [] })),

    // Vendor signup
    applyVendor: (data) => setState(s => {
      const id = 'v-' + Math.random().toString(36).slice(2, 8);
      const newV = { id, ...data, status: 'pending', appliedAt: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) };
      return { ...s, vendors: [...s.vendors, newV] };
    }),

    // Admin actions
    approveVendor: (id) => setState(s => ({
      ...s,
      vendors: s.vendors.map(v => v.id === id ? { ...v, status: 'approved', score: 100 } : v)
    })),
    rejectVendor: (id) => setState(s => ({
      ...s,
      vendors: s.vendors.map(v => v.id === id ? { ...v, status: 'rejected' } : v)
    })),

    // Product CRUD (vendor)
    addProduct: (p) => setState(s => ({ ...s, products: [{ ...p, id: 'p-' + Math.random().toString(36).slice(2, 8), recommended: 0, clicks: 0, approved: true }, ...s.products] })),
    updateProduct: (p) => setState(s => ({ ...s, products: s.products.map(x => x.id === p.id ? p : x) })),
    deleteProduct: (id) => setState(s => ({ ...s, products: s.products.filter(p => p.id !== id) })),
    toggleProductListed: (id) => setState(s => ({ ...s, products: s.products.map(p => p.id === id ? { ...p, listed: !p.listed } : p) })),
    updateStock: (id, stock) => setState(s => ({ ...s, products: s.products.map(p => p.id === id ? { ...p, stock } : p) })),

    // Buyer actions
    signupBuyer: (data) => setState(s => {
      const id = 'b-' + Math.random().toString(36).slice(2, 8);
      const newB = { id, ...data };
      return { ...s, buyers: [...s.buyers, newB], currentUser: { ...newB, role: 'buyer' } };
    }),
    updateBuyerProfile: (profile) => setState(s => ({ ...s, buyerProfile: profile })),
    addToCart: (item) => setState(s => {
      const existing = s.buyerCart.find(x => x.productId === item.productId && x.size === item.size);
      if (existing) {
        return { ...s, buyerCart: s.buyerCart.map(x => x === existing ? { ...x, qty: x.qty + 1 } : x) };
      }
      return { ...s, buyerCart: [...s.buyerCart, item] };
    }),
    removeFromCart: (productId, size) => setState(s => ({ ...s, buyerCart: s.buyerCart.filter(x => !(x.productId === productId && x.size === size)) })),
    updateCartQty: (productId, size, qty) => setState(s => ({ ...s, buyerCart: s.buyerCart.map(x => (x.productId === productId && x.size === size) ? { ...x, qty } : x) })),

    placeOrders: (buyerInfo) => setState(s => {
      const now = new Date().toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit', hour12: true });
      const newOrders = s.buyerCart.map(item => {
        const p = s.products.find(x => x.id === item.productId);
        return {
          id: 'SY-' + Math.floor(Math.random() * 9000 + 1000),
          vendorId: p?.vendorId || '',
          buyerId: s.currentUser?.id || 'buyer-demo',
          productId: item.productId,
          size: item.size, qty: item.qty, price: item.price,
          buyer: buyerInfo.name, city: buyerInfo.city, pin: buyerInfo.pin,
          status: 'to-ship', placed: now, dispatchByHrs: 48,
        };
      });
      // Decrement stock
      const updatedProducts = s.products.map(p => {
        const orderForP = newOrders.filter(o => o.productId === p.id);
        if (orderForP.length === 0) return p;
        const newStock = { ...p.stock };
        orderForP.forEach(o => { newStock[o.size] = Math.max(0, (newStock[o.size] || 0) - o.qty); });
        return { ...p, stock: newStock };
      });
      return {
        ...s,
        orders: [...newOrders, ...s.orders],
        products: updatedProducts,
        buyerCart: [],
        buyerOrders: [...newOrders, ...(s.buyerOrders || [])],
      };
    }),

    // Vendor order actions
    shipOrder: (orderId) => setState(s => ({
      ...s,
      orders: s.orders.map(o => o.id === orderId ? { ...o, status: 'in-transit' } : o)
    })),
    markDelivered: (orderId) => setState(s => ({
      ...s,
      orders: s.orders.map(o => o.id === orderId ? { ...o, status: 'delivered' } : o)
    })),
    cancelOrder: (orderId) => setState(s => ({
      ...s,
      orders: s.orders.map(o => o.id === orderId ? { ...o, status: 'cancelled' } : o)
    })),

    // Returns
    approveReturn: (returnId) => setState(s => {
      const ret = s.returns.find(r => r.id === returnId);
      if (!ret) return s;
      return {
        ...s,
        returns: s.returns.map(r => r.id === returnId ? { ...r, status: 'approved' } : r),
        products: s.products.map(p => p.id === ret.productId ? { ...p, stock: { ...p.stock, [ret.size]: (p.stock[ret.size] || 0) + 1 } } : p),
      };
    }),
    disputeReturn: (returnId) => setState(s => ({
      ...s,
      returns: s.returns.map(r => r.id === returnId ? { ...r, status: 'disputed' } : r)
    })),

    resetAll: () => {
      localStorage.removeItem(STORAGE_KEY);
      setState(defaultState());
    },
  }), []);

  return (
    <AppContext.Provider value={{ state, actions, addToast }}>
      {children}
      <div className="toast-stack">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>
            <span>{t.icon}</span><span>{t.message}</span>
          </div>
        ))}
      </div>
    </AppContext.Provider>
  );
}

function BuyerOnboard({ onNav }) {
  const { state, actions, addToast } = useApp();
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState({ gender: null, scanned: false, height: 162, weight: 58, chest: 88, waist: 72, hip: 94, fit: 'regular', style: null });
  const [scanning, setScanning] = useState(false);

  const next = () => setStep(s => s + 1);

  useEffect(() => {
    if (step === 2 && scanning === false && !profile.scanned) {
      setScanning(true);
      const t = setTimeout(() => { setScanning(false); setProfile(p => ({ ...p, scanned: true })); }, 3000);
      return () => clearTimeout(t);
    }
  }, [step]);

  const finish = () => {
    actions.updateBuyerProfile(profile);
    addToast('Profile complete. Welcome to Styli.', 'success');
    onNav('buyer-shop');
  };

  if (!state.currentUser) { onNav('buyer-login'); return null; }

  return (
    <div className="onboard-wrap">
      <div className="onboard-card">
        {step === 0 && (
          <>
            <div className="onboard-step-label">Step 1 of 4</div>
            <h2 className="onboard-question">Who are we <em>styling</em>?</h2>
            <p className="onboard-sub">So we can show you the right catalogs.</p>
            <div className="onboard-options">
              {[
                { id: 'women', title: "Women's", sub: 'Kurtas, dresses, ethnic & western' },
                { id: 'men', title: "Men's", sub: 'Shirts, trousers, ethnic & casual' },
                { id: 'both', title: 'Both / no preference', sub: 'Show me everything' },
              ].map(o => (
                <button key={o.id} className={`onboard-option ${profile.gender === o.id ? 'selected' : ''}`} onClick={() => setProfile(p => ({ ...p, gender: o.id }))}>
                  <div className="onboard-option-visual"></div>
                  <div className="onboard-option-content">
                    <div className="onboard-option-title">{o.title}</div>
                    <div className="onboard-option-sub">{o.sub}</div>
                  </div>
                </button>
              ))}
            </div>
            <button className="btn btn-primary auth-btn" disabled={!profile.gender} onClick={next}>Continue →</button>
          </>
        )}

        {step === 1 && (
          <>
            <div className="onboard-step-label">Step 2 of 4</div>
            <h2 className="onboard-question">Your <em>measurements</em></h2>
            <p className="onboard-sub">Rough estimates are fine. Helps us recommend your size.</p>
            <div className="field-row">
              <div className="field"><label className="field-label">Height (cm)</label><input className="field-input" type="number" value={profile.height} onChange={e => setProfile(p => ({ ...p, height: e.target.value }))} /></div>
              <div className="field"><label className="field-label">Weight (kg)</label><input className="field-input" type="number" value={profile.weight} onChange={e => setProfile(p => ({ ...p, weight: e.target.value }))} /></div>
            </div>
            <div className="field-row">
              <div className="field"><label className="field-label">{profile.gender === 'men' ? 'Chest' : 'Bust'} (cm)</label><input className="field-input" type="number" value={profile.chest} onChange={e => setProfile(p => ({ ...p, chest: e.target.value }))} /></div>
              <div className="field"><label className="field-label">Waist (cm)</label><input className="field-input" type="number" value={profile.waist} onChange={e => setProfile(p => ({ ...p, waist: e.target.value }))} /></div>
            </div>
            <div className="field">
              <label className="field-label">Preferred fit</label>
              <div style={{ display: 'flex', gap: 8 }}>
                {['Slim', 'Regular', 'Relaxed', 'Oversized'].map(f => (
                  <button key={f} className={`filter-pill ${profile.fit === f.toLowerCase() ? 'active' : ''}`} onClick={() => setProfile(p => ({ ...p, fit: f.toLowerCase() }))}>{f}</button>
                ))}
              </div>
            </div>
            <button className="btn btn-primary auth-btn" onClick={next}>Continue →</button>
          </>
        )}

        {step === 2 && (
          <>
            <div className="onboard-step-label">Step 3 of 4</div>
            <h2 className="onboard-question">Face <em>scan</em></h2>
            <p className="onboard-sub">We look at face shape, skin undertone, and features. Photo never leaves your device.</p>
            <div className="scan-viz">
              <div className="scan-face"></div>
              {scanning && <div className="scan-beam"></div>}
            </div>
            {profile.scanned ? (
              <>
                <div className="scan-results-card">
                  <div className="row"><span className="lbl">Face shape</span><span className="val">Oval</span></div>
                  <div className="row"><span className="lbl">Skin undertone</span><span className="val">Warm</span></div>
                  <div className="row"><span className="lbl">Eye colour</span><span className="val">Deep brown</span></div>
                  <div className="row"><span className="lbl">Hair tone</span><span className="val">Natural black</span></div>
                </div>
                <button className="btn btn-primary auth-btn" onClick={next}>Looks right, continue →</button>
              </>
            ) : (
              <p style={{ textAlign: 'center', color: 'var(--muted)', fontSize: 14 }}>Reading your features...</p>
            )}
          </>

        {step === 3 && (
          <>
            <div className="onboard-step-label">Step 4 of 4</div>
            <h2 className="onboard-question">Pick your <em>vibe</em></h2>
            <p className="onboard-sub">What feels most like your style? We'll learn more as you shop.</p>
            <div className="onboard-options">
              {(profile.gender === 'men' ? [
                { id: 'classic', title: 'Classic & Polished', sub: 'Crisp shirts, tailored, timeless' },
                { id: 'casual', title: 'Relaxed & Casual', sub: 'Linen, cotton, easy layers' },
                { id: 'street', title: 'Streetwear', sub: 'Oversized, graphic, expressive' },
                { id: 'ethnic', title: 'Ethnic & Fusion', sub: 'Kurtas, bundis, modern cuts' },
              ] : [
                { id: 'classic', title: 'Classic & Polished', sub: 'Clean lines, timeless' },
                { id: 'boho', title: 'Boho & Flowy', sub: 'Prints, layered, feminine drape' },
                { id: 'minimal', title: 'Minimal & Modern', sub: 'Neutral tones, structured fits' },
                { id: 'ethnic', title: 'Ethnic & Fusion', sub: 'Kurtas, co-ords, contemporary drapes' },
              ]).map(o => (
                <button key={o.id} className={`onboard-option ${profile.style === o.id ? 'selected' : ''}`} onClick={() => setProfile(p => ({ ...p, style: o.id }))}>
                  <div className="onboard-option-visual"></div>
                  <div className="onboard-option-content">
                    <div className="onboard-option-title">{o.title}</div>
                    <div className="onboard-option-sub">{o.sub}</div>
                  </div>
                </button>
              ))}
            </div>
            <button className="btn btn-primary auth-btn" disabled={!profile.style} onClick={finish}>Finish & start shopping →</button>
          </>
        )}
      </div>
    </div>
  );
}

// ============ BUYER SHOP ============
function BuyerShop({ onNav }) {
  const { state, actions, addToast } = useApp();
  const [cat, setCat] = useState('all');

  const user = state.currentUser;
  if (!user) { onNav('buyer-login'); return null; }
  if (!state.buyerProfile) { onNav('buyer-onboard'); return null; }

  const wishlist = state.buyerWishlist || [];
  const isWished = (id) => wishlist.includes(id);

  const liveProducts = state.products.filter(p => p.listed && p.approved && totalStock(p.stock) > 0);
  const categories = ['all', ...Array.from(new Set(liveProducts.map(p => p.category)))];
  const shown = cat === 'all' ? liveProducts : liveProducts.filter(p => p.category === cat);

  // Mock match score — higher for products matching preferences
  const matchFor = (p) => {
    let s = 75;
    if (state.buyerProfile.style === 'boho' && p.tags.some(t => /Floral|Block|Hand-block|Boho/.test(t))) s += 18;
    if (state.buyerProfile.style === 'classic' && p.tags.some(t => /Slim|Formal|Oxford/.test(t))) s += 16;
    if (state.buyerProfile.style === 'minimal' && p.tags.some(t => /Neutral|Solid|Minimal/.test(t))) s += 16;
    if (state.buyerProfile.style === 'casual' && p.tags.some(t => /Relaxed|Cotton|Casual/.test(t))) s += 14;
    return Math.min(97, s + Math.floor(Math.random() * 6));
  };

  const withMatch = shown.map(p => ({ ...p, match: matchFor(p) })).sort((a, b) => b.match - a.match);

  return (
    <BuyerLayout active="buyer-shop" onNav={onNav}>
      <div className="buyer-page">
        <div className="buyer-hero">
          <div>
            <div className="landing-eyebrow" style={{ marginBottom: 16 }}>Hello {user.name?.split(' ')[0] || 'there'}</div>
            <h1 className="buyer-hero-headline">Your edit is <em>ready</em>.</h1>
            <p className="buyer-hero-sub">Curated from boutiques and brands across India based on your profile. Tap any piece to see why it suits you and where to buy.</p>
          </div>
          <div className="buyer-hero-visual"></div>
        </div>

        <div className="section-head">
          <div>
            <div className="section-title"><em>{liveProducts.length}</em> pieces matched for you</div>
            <div className="section-sub">Across {new Set(liveProducts.map(p => p.vendorId)).size} brands on Styli</div>
          </div>
        </div>

        <div className="filters">
          {categories.map(c => (
            <button key={c} className={`filter-chip ${cat === c ? 'active' : ''}`} onClick={() => setCat(c)}>{c === 'all' ? 'All' : c}</button>
          ))}
        </div>

        <div className="products-grid">
          {withMatch.map(p => {
            const v = state.vendors.find(x => x.id === p.vendorId);
            const wished = isWished(p.id);
            return (
              <button key={p.id} className="product-card" onClick={() => { onNav('buyer-product', p.id); }}>
                <div className={`product-image ${p.grad}`}>
                  <div className="match-badge">{p.match}% match</div>
                  <button
                    className={`wish-btn ${wished ? 'active' : ''}`}
                    onClick={(e) => {
                      e.stopPropagation();
                      actions.toggleWishlist(p.id);
                      addToast(wished ? 'Removed from wishlist' : 'Saved to wishlist', wished ? 'info' : 'success');
                    }}
                    aria-label={wished ? 'Remove from wishlist' : 'Save to wishlist'}
                  ></button>
                </div>
                <div className="product-brand">{v?.name || 'Brand'}</div>
                <div className="product-name">{p.name}</div>
                <div className="product-price">{formatINR(p.price)}</div>
              </button>
            );
          })}
        </div>
      </div>
    </BuyerLayout>
  );
}

function BuyerProduct({ onNav, productId }) {
  const { state, actions, addToast } = useApp();
  const p = state.products.find(x => x.id === productId);
  const [size, setSize] = useState(null);

  if (!p) { onNav('buyer-shop'); return null; }
  const v = state.vendors.find(x => x.id === p.vendorId);

  const addCart = () => {

    actions.addToCart({ productId: p.id, size, qty: 1, price: p.price });

  const match = 85 + Math.floor(Math.random() * 10);
  const wished = (state.buyerWishlist || []).includes(p.id);

  return (
    <BuyerLayout active="buyer-shop" onNav={onNav}>
      <div className="buyer-page">
        <div className="breadcrumb">
          <a onClick={() => onNav('buyer-shop')}>Shop</a> / <a>{p.category}</a> / <span>{p.name}</span>
        </div>
        <div className="product-detail" style={{ padding: 0 }}>

            <div className="detail-brand">{v?.name || 'Brand'}</div>

            <div className="detail-price">{formatINR(p.price)}</div>
            <p className="detail-desc">{p.description}</p>
            <div className="why-section">
              <div className="why-label">Why this suits you · {match}% match</div>
              <div className="why-item"><div className="why-bullet">1</div><div className="why-text">The {p.tags[0]?.toLowerCase() || 'fit'} works for your {state.buyerProfile?.fit || 'regular'} fit preference</div></div>
              <div className="why-item"><div className="why-bullet">2</div><div className="why-text">{p.tags.includes('Warm tones') || p.tags.includes('Cool tones') ? `Complements your warm undertone` : 'Color palette suits your undertone'}</div></div>
              <div className="why-item"><div className="why-bullet">3</div><div className="why-text">{v?.name} runs true to size in our tests — size {size || 'M'} fits your measurements</div></div>

            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-primary" style={{ flex: 1 }} onClick={addCart}>Add to cart</button>
              <button
                className="btn btn-secondary"
                onClick={() => {
                  actions.toggleWishlist(p.id);
                  addToast(wished ? 'Removed from wishlist' : 'Saved to wishlist', wished ? 'info' : 'success');
                }}
                aria-label={wished ? 'Remove from wishlist' : 'Save to wishlist'}
              >{wished ? '♥ Saved' : '♡ Save'}</button>
              <button className="btn btn-secondary" onClick={() => onNav('buyer-shop')}>Keep browsing</button>
            </div>
          </div>
        </div>
      </div>
    </BuyerLayout>
  );
}

function BuyerCart({ onNav }) {
  const { state, actions, addToast } = useApp();
  const user = state.currentUser;

  const items = state.buyerCart.map(c => {
    const p = state.products.find(x => x.id === c.productId);
    const v = p ? state.vendors.find(x => x.id === p.vendorId) : null;
    return { ...c, product: p, vendor: v };
  }).filter(x => x.product);

  const subtotal = items.reduce((s, x) => s + x.price * x.qty, 0);
  const shipping = subtotal > 0 ? 99 : 0;
  const total = subtotal + shipping;

  const [city, setCity] = useState(user?.city || 'Delhi');
  const [pin, setPin] = useState('110001');

  const checkout = () => {
    if (items.length === 0) return;
    actions.placeOrders({ name: user.name, city, pin });
    addToast(`${items.length} order${items.length !== 1 ? 's' : ''} placed!`, 'success', '🛍');
    onNav('buyer-orders');
  };

  return (
    <BuyerLayout active="buyer-cart" onNav={onNav}>
      <div className="buyer-page" style={{ maxWidth: 1000 }}>
        <div className="breadcrumb"><a onClick={() => onNav('buyer-shop')}>Shop</a> / <span>Cart</span></div>
        <div className="section-head">
          <div><div className="section-title">Your <em>cart</em></div><div className="section-sub">{items.length} item{items.length !== 1 ? 's' : ''}</div></div>
        </div>

        {items.length === 0 ? (
          <div className="empty-state">
            <div className="empty-state-icon">◌</div>
            <div className="empty-state-text">Your cart is empty.</div>
            <button className="btn btn-primary" onClick={() => onNav('buyer-shop')}>Start shopping</button>
          </div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: '1.5fr 1fr', gap: 32 }}>
          <div>
            {items.map(it => (
              <div key={it.productId + it.size} className="cart-item">
                <div className={`cart-item-img ${it.product.grad}`}></div>
                <div className="cart-item-info">
                  <div className="cart-item-brand">{it.vendor?.name}</div>
                  <div className="cart-item-name">{it.product.name}</div>
                  <div className="cart-item-meta">Size {it.size}</div>
                  <div style={{ marginTop: 10, display: 'flex', gap: 10, alignItems: 'center' }}>
                    <div className="quantity-control">
                      <button className="qty-btn" onClick={() => actions.updateCartQty(it.productId, it.size, Math.max(1, it.qty - 1))}>−</button>
                      <input className="qty-input" value={it.qty} readOnly />
                      <button className="qty-btn" onClick={() => actions.updateCartQty(it.productId, it.size, it.qty + 1)}>+</button>
                    </div>
                    <button className="btn btn-small btn-ghost" onClick={() => actions.removeFromCart(it.productId, it.size)}>Remove</button>
                  </div>
                </div>
                <div className="cart-item-price">{formatINR(it.price * it.qty)}</div>
              </div>
            ))}
          </div>
          <div>
            <div className="cart-summary" style={{ marginBottom: 14 }}>
              <div className="cart-summary-row"><span>Subtotal</span><span>{formatINR(subtotal)}</span></div>
              <div className="cart-summary-row"><span>Shipping</span><span>{formatINR(shipping)}</span></div>
              <div className="cart-summary-row total"><span>Total</span><span>{formatINR(total)}</span></div>
            </div>
            <div className="panel" style={{ padding: 18 }}>
              <div className="panel-sub" style={{ marginBottom: 12 }}>Delivery details</div>
              <div className="field">
                <label className="field-label">City</label>
                <input className="field-input" value={city} onChange={e => setCity(e.target.value)} />
              </div>
              <div className="field">
                <label className="field-label">PIN code</label>
                <input className="field-input" value={pin} onChange={e => setPin(e.target.value)} />
              </div>
              <button className="btn btn-primary" style={{ width: '100%', marginTop: 8 }} onClick={checkout}>Place order · {formatINR(total)}</button>
              <div style={{ fontSize: 11, color: 'var(--muted)', textAlign: 'center', marginTop: 10 }}>No real payment — this is a prototype.</div>
            </div>
          </div>
        </div>
        )}
      </div>
    </BuyerLayout>
  );
}

  const badges = {
    inventory: myProducts.filter(p => isStockLow(p.stock) || isStockCritical(p.stock)).length,

function ProductEditor({ product, vendorId, onClose, onSave, onDelete }) {
  const isNew = !product;
  const [name, setName] = useState(product?.name || '');
  const [category, setCategory] = useState(product?.category || 'Kurtas');
  const [price, setPrice] = useState(product?.price || 0);
  const [description, setDescription] = useState(product?.description || '');
  const [grad, setGrad] = useState(product?.grad || 'grad-1');
  const [tags, setTags] = useState(product?.tags || []);
  const [sizes, setSizes] = useState(product?.sizes || ['S','M','L']);
  const [stock, setStock] = useState(product?.stock || { S: 0, M: 0, L: 0 });

  const GRADS = ['grad-1','grad-2','grad-3','grad-4','grad-5','grad-6','grad-7','grad-8','grad-9','grad-10'];
  const CATS = ['Kurtas','Dresses','Tops','Trousers','Sarees','Shirts','Co-ord Sets','Ethnic','Accessories'];
  const TAGS = ['A-line','Slim fit','Relaxed','Cotton','Linen','Silk','Casual','Formal','Festive','Block print','Hand-block','Solid','Floral','Warm tones','Cool tones','Neutral'];

  const toggleTag = (t) => setTags(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);
  const toggleSize = (s) => {
    if (sizes.includes(s)) {
      setSizes(ss => ss.filter(x => x !== s));
      const ns = { ...stock }; delete ns[s]; setStock(ns);
    } else {
      setSizes(ss => [...ss, s]);
      setStock(st => ({ ...st, [s]: 0 }));
    }
  };
  const save = () => {
    if (!name.trim()) return;
    onSave({
      id: product?.id,
      vendorId,
      name: name.trim(),
      category, price: parseInt(price) || 0,
      description: description.trim(),
      grad, tags, sizes, stock,
      listed: product?.listed ?? true,
      approved: product?.approved ?? true,
      recommended: product?.recommended || 0,
      clicks: product?.clicks || 0,
    });
  };

  return (
    <Modal open onClose={onClose} large title={isNew ? 'Add new product' : `Edit · ${product.name}`}
      footer={<>
        {!isNew && <button className="btn btn-danger" onClick={() => { if (confirm('Delete this product?')) onDelete(product.id); }}>Delete</button>}
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" disabled={!name.trim()} onClick={save}>{isNew ? 'Add product' : 'Save changes'}</button>
      </>}>
      <div className="field-row">
        <div className="field"><label className="field-label">Product name</label><input className="field-input" value={name} onChange={e => setName(e.target.value)} /></div>
        <div className="field"><label className="field-label">Category</label><select className="field-input" value={category} onChange={e => setCategory(e.target.value)}>{CATS.map(c => <option key={c}>{c}</option>)}</select></div>
      </div>
      <div className="field-row">
        <div className="field"><label className="field-label">Price (₹)</label><input className="field-input" type="number" value={price} onChange={e => setPrice(e.target.value)} /></div>
        <div className="field">
          <label className="field-label">Color preview</label>
          <div className="color-grid">{GRADS.map(g => <div key={g} className={`color-swatch ${g} ${grad === g ? 'selected' : ''}`} onClick={() => setGrad(g)}></div>)}</div>
        </div>
      </div>
      <div className="field"><label className="field-label">Description</label><textarea className="field-input" value={description} onChange={e => setDescription(e.target.value)} /></div>
      <div className="field">
        <label className="field-label">Available sizes</label>
        <div className="tag-row">{['XS','S','M','L','XL','XXL','Free'].map(s => <button key={s} className={`filter-pill ${sizes.includes(s) ? 'active' : ''}`} onClick={() => toggleSize(s)}>{s}</button>)}</div>
      </div>
      {sizes.length > 0 && (
        <div className="field">
          <label className="field-label">Stock per size</label>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${Math.min(sizes.length, 6)}, 1fr)`, gap: 8 }}>
            {sizes.map(s => (
              <div key={s} style={{ background: 'var(--cream-light)', padding: 10, borderRadius: 8, textAlign: 'center' }}>
                <div className="text-xs muted" style={{ marginBottom: 4 }}>{s}</div>
                <input className="field-input" type="number" value={stock[s] || 0} onChange={e => setStock(st => ({ ...st, [s]: Math.max(0, parseInt(e.target.value) || 0) }))} style={{ textAlign: 'center', padding: '6px 4px' }} />
              </div>
            ))}
          </div>
        </div>
      )}
      <div className="field">
        <label className="field-label">Style tags</label>
        <div className="tag-row">{TAGS.map(t => <button key={t} className={`filter-pill ${tags.includes(t) ? 'active' : ''}`} onClick={() => toggleTag(t)}>{t}</button>)}</div>
      </div>
    </Modal>
  );
}

function VendorInventory({ products }) {
  const { actions, addToast } = useApp();

  const filtered = products.filter(p => {
    if (filter === 'low') return isStockLow(p.stock);
    if (filter === 'out') return isStockCritical(p.stock);
    return true;
  });

  return (

      <div className="page-header">
        <div><h1 className="page-title">Inventory</h1><div className="page-sub">Adjust stock levels across SKUs and sizes</div></div>

        <button className={`filter-pill ${filter === 'low' ? 'active' : ''}`} onClick={() => setFilter('low')}>Low stock ({products.filter(p => isStockLow(p.stock)).length})</button>
        <button className={`filter-pill ${filter === 'out' ? 'active' : ''}`} onClick={() => setFilter('out')}>Out ({products.filter(p => isStockCritical(p.stock)).length})</button>
      </div>

      {filtered.length === 0 ? (

            <tbody>
              {filtered.map(p => {
                const total = totalStock(p.stock);
                return (
                  <tr key={p.id}>
                    <td><div className="product-row"><div className={`product-thumb ${p.grad}`}></div><div><div className="cell-primary">{p.name}</div><div className="cell-sub">{p.category}</div></div></div></td>

                    <td>{isStockCritical(p.stock) ? <span className="badge badge-alert">Out</span> : isStockLow(p.stock) ? <span className="badge badge-warn">Low</span> : <span className="badge badge-ok">Available</span>}</td>
                    <td><button className="btn btn-small btn-secondary" onClick={() => setEditing(p)}>Adjust</button></td>
                  </tr>

              })}

          </table>
        </div>
      )}

      {editing && (
        <Modal open onClose={() => setEditing(null)} title={`Adjust stock · ${editing.name}`}
          footer={<><button className="btn btn-secondary" onClick={() => setEditing(null)}>Cancel</button></>}>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {editing.sizes.map(s => (
              <div key={s} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: 12, background: 'var(--cream-light)', borderRadius: 10 }}>

// ============ ROUTER (URL-based) ============
// Maps route IDs to URL paths and back. Single source of truth.
const ROUTES = {
  'landing':         { path: '/' },
  'buyer-signup':    { path: '/signup' },
  'buyer-login':     { path: '/login' },
  'buyer-onboard':   { path: '/onboarding' },
  'buyer-shop':      { path: '/shop' },
  'buyer-product':   { path: '/product/:id', pattern: /^\/product\/([^/]+)$/ },
  'buyer-cart':      { path: '/cart' },
  'buyer-wishlist':  { path: '/wishlist' },
  'buyer-orders':    { path: '/orders' },
  'buyer-profile':   { path: '/profile' },
  'vendor-login':    { path: '/vendor/login' },
  'vendor-apply':    { path: '/vendor/apply' },
  'vendor-applied':  { path: '/vendor/applied' },
  'vendor-pending':  { path: '/vendor/pending' },
  'vendor-dashboard':{ path: '/vendor/dashboard' },
  'admin-login':     { path: '/admin/login' },
  'admin-dashboard': { path: '/admin' },
};

// Convert URL path → route + param
function parseUrl(pathname) {
  // Normalise trailing slash (except root)
  const path = pathname !== '/' && pathname.endsWith('/') ? pathname.slice(0, -1) : pathname;
  // Try exact match first
  for (const [routeId, cfg] of Object.entries(ROUTES)) {
    if (cfg.path === path) return { route: routeId, param: null };
  }
  // Try pattern match (for product/:id)
  for (const [routeId, cfg] of Object.entries(ROUTES)) {
    if (cfg.pattern) {
      const m = path.match(cfg.pattern);
      if (m) return { route: routeId, param: m[1] };
    }
  }
  // Default: landing for unknown
  return { route: 'landing', param: null };
}

// Convert route + param → URL path
function buildUrl(route, param) {
  const cfg = ROUTES[route];
  if (!cfg) return '/';
  if (cfg.pattern && param) return cfg.path.replace(':id', param);
  return cfg.path;
}

function Router() {
  const { state, actions, addToast } = useApp();
  const [{ route, routeParam }, setLocation] = useState(() => {
    // Handle GitHub Pages 404 SPA redirect on first load
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get('_redirect');
    if (redirect) {
      window.history.replaceState({}, '', redirect);
      const parsed = parseUrl(redirect);
      return { route: parsed.route, routeParam: parsed.param };
    }
    const parsed = parseUrl(window.location.pathname);
    return { route: parsed.route, routeParam: parsed.param };
  });

  // Listen to browser back/forward
  useEffect(() => {
    const onPopState = () => {
      const parsed = parseUrl(window.location.pathname);
      setLocation({ route: parsed.route, routeParam: parsed.param });
      window.scrollTo(0, 0);
    };
    window.addEventListener('popstate', onPopState);
    return () => window.removeEventListener('popstate', onPopState);
  }, []);

  // Navigation function — pushes URL and updates state
  const nav = (r, param) => {
    const url = buildUrl(r, param);
    if (window.location.pathname !== url) {
      window.history.pushState({}, '', url);
    }
    setLocation({ route: r, routeParam: param });
    window.scrollTo(0, 0);
  };

  const needsTopBar = !['landing','buyer-signup','buyer-login','vendor-login','vendor-apply','vendor-applied','vendor-pending','admin-login','buyer-onboard'].includes(route);
  const logout = () => { actions.logout(); addToast('Logged out', 'info'); nav('landing'); };

  return (
    <div className="app-body">
      <div className="demo-banner">
        <span><strong>STYLI PLATFORM</strong> — Prototype · Data persists in browser</span>
        <button onClick={() => { if (confirm('Reset all demo data?')) { actions.resetAll(); nav('landing'); } }}>Reset demo</button>
      </div>
      {needsTopBar && <TopBar onNav={nav} currentUser={state.currentUser} onLogout={logout} />}

      {route === 'landing' && <Landing onNav={nav} />}
      {route === 'buyer-signup' && <BuyerSignup onNav={nav} />}
      {route === 'buyer-login' && <BuyerLogin onNav={nav} />}
      {route === 'buyer-onboard' && <BuyerOnboard onNav={nav} />}
      {route === 'buyer-shop' && <BuyerShop onNav={nav} />}
      {route === 'buyer-product' && <BuyerProduct onNav={nav} productId={routeParam} />}
      {route === 'buyer-cart' && <BuyerCart onNav={nav} />}
      {route === 'buyer-wishlist' && <BuyerWishlist onNav={nav} />}
      {route === 'buyer-orders' && <BuyerOrders onNav={nav} />}
      {route === 'buyer-profile' && <BuyerProfile onNav={nav} />}
      {route === 'vendor-login' && <VendorLogin onNav={nav} />}
      {route === 'vendor-apply' && <VendorApply onNav={nav} />}
      {route === 'vendor-applied' && <VendorApplied onNav={nav} />}
      {route === 'vendor-pending' && <VendorPending onNav={nav} />}
      {route === 'vendor-dashboard' && <VendorDashboard onNav={nav} />}
      {route === 'admin-login' && <AdminLogin onNav={nav} />}
      {route === 'admin-dashboard' && <AdminDashboard onNav={nav} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><Router /></AppProvider>
);
